<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Talivo – Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --ink: #1a1814;
      --ink-soft: #5a5651;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --border: #e8e4df;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -180px;
      right: -120px;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, #b7e4c7 0%, transparent 70%);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Language Toggle ── */
    .lang-toggle {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      align-self: flex-end;
      max-width: 680px;
      width: 100%;
    }

    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .lang-btn:not(.active):hover {
      background: var(--accent-light);
      border-color: var(--accent-light);
      color: var(--accent);
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      max-width: 680px;
      width: 100%;
      padding: 56px 60px 52px;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 32px rgba(0,0,0,0.06),
        0 24px 64px rgba(0,0,0,0.04);
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    .app-badge svg {
      width: 14px; height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(32px, 5vw, 42px);
      font-weight: 400;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 15px;
      color: var(--ink-soft);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 440px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, var(--accent-light), var(--border), transparent);
      margin-bottom: 40px;
    }

    .contact-block {
      padding: 28px 32px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.5s ease 0.15s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .icon-wrap {
      flex-shrink: 0;
      width: 46px; height: 46px;
      border-radius: 12px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 20px; height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-info { display: flex; flex-direction: column; gap: 4px; }

    .contact-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .contact-email {
      color: var(--accent);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: opacity 0.2s;
    }

    .contact-email:hover { opacity: 0.7; text-decoration: underline; }

    .note {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.5s ease 0.25s both;
    }

    .note-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .note-icon svg {
      width: 16px; height: 16px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .note p {
      font-size: 13px;
      color: var(--ink-soft);
      font-weight: 300;
      line-height: 1.5;
    }

    .copyright {
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--ink-soft);
      font-weight: 300;
      animation: fadeIn 0.5s ease 0.35s both;
    }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #b8b3ad;
      text-align: center;
      z-index: 1;
      position: relative;
    }

    @media (max-width: 520px) {
      .card { padding: 36px 28px 40px; }
    }
  </style>
</head>
<body>

<!-- Language Toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btn-tr" onclick="setLang('tr')">TR</button>
</div>

<div class="card">

  <div class="app-badge">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span id="badge-text">Support</span>
  </div>

  <h1 id="heading">We're here to <em>help.</em></h1>
  <p class="subtitle" id="subtitle">If you need help with Talivo, feel free to reach out anytime. We're happy to assist.</p>

  <div class="divider"></div>

  <div class="contact-block">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <div class="contact-info">
      <span class="contact-label" id="contact-label">Email us</span>
      <a class="contact-email" href="mailto:softwareyokatali@gmail.com">softwareyokatali@gmail.com</a>
    </div>
  </div>

  <div class="note">
    <div class="note-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    </div>
    <p id="note-text">We usually respond within 24 hours.</p>
  </div>

  <div class="copyright" id="copyright">&#169; 2026 Talivo</div>

</div>

<footer id="footer">All rights reserved</footer>

<script>
  const translations = {
    en: {
      badge: 'Support',
      heading: "We're here to <em>help.</em>",
      subtitle: "If you need help with Talivo, feel free to reach out anytime. We're happy to assist.",
      contactLabel: 'Email us',
      noteText: 'We usually respond within 24 hours.',
      copyright: '© 2026 Talivo',
      footer: 'All rights reserved'
    },
    tr: {
      badge: 'Destek',
      heading: 'Size yardımcı olmak için <em>buradayız.</em>',
      subtitle: "Talivo ile ilgili herhangi bir konuda yardıma ihtiyaç duyarsanız bize istediğiniz zaman ulaşabilirsiniz.",
      contactLabel: 'E-posta gönderin',
      noteText: 'Genellikle 24 saat içinde yanıt veriyoruz.',
      copyright: '© 2026 Talivo',
      footer: 'Tüm hakları saklıdır'
    }
  };

  function setLang(lang) {
    const t = translations[lang];
    document.getElementById('badge-text').textContent = t.badge;
    document.getElementById('heading').innerHTML = t.heading;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('contact-label').textContent = t.contactLabel;
    document.getElementById('note-text').textContent = t.noteText;
    document.getElementById('copyright').textContent = t.copyright;
    document.getElementById('footer').textContent = t.footer;
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
    document.documentElement.lang = lang;
  }
</script>

</body>
</html>
